appId: com.socialsync.app
productName: SocialSync
directories:
  output: release
  buildResources: build
files:
  - dist
  - dist-electron
  - package.json
asar: true
win:
  target:
    - nsis
  icon: build/icon.ico
mac:
  target:
    - dmg
    - zip
  icon: build/icon.icns
  category: public.app-category.social-networking
linux:
  target:
    - AppImage
    - deb
  icon: build
  category: Network
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: YOUR_GITHUB_USERNAME
  repo: socialsync
